openapi: 3.0.3
info:
  title: Data Lake Provisioner API
  version: 0.1.0
  description: |
    MVP Provisioner API for Movincloud Data Lake service.
    AuthN/AuthZ integration is deferred; this version uses X-Internal-Token + X-Tenant.
servers:
  - url: http://localhost:8081

security:
  - InternalToken: []

paths:
  /health:
    get:
      summary: Health check
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /v1/lakes:
    post:
      summary: Provision a new data lake
      operationId: provisionLake
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProvisionLakeRequest'
      responses:
        '202':
          description: Provision operation accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/lakes/{lakeId}:
    get:
      summary: Get data lake details
      operationId: getLake
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/LakeIdPath'
      responses:
        '200':
          description: Data lake details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lake'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      summary: Deprovision data lake
      operationId: deprovisionLake
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/LakeIdPath'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      responses:
        '202':
          description: Deprovision operation accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/lakes/{lakeId}/resize:
    post:
      summary: Resize lake quota
      operationId: resizeLake
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/LakeIdPath'
        - $ref: '#/components/parameters/IdempotencyKeyHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResizeLakeRequest'
      responses:
        '202':
          description: Resize operation accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /v1/operations/{operationId}:
    get:
      summary: Get operation status
      operationId: getOperation
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/OperationIdPath'
      responses:
        '200':
          description: Operation details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    InternalToken:
      type: apiKey
      in: header
      name: X-Internal-Token

  parameters:
    TenantHeader:
      in: header
      name: X-Tenant
      required: true
      schema:
        type: string
      description: Tenant context propagated by Movincloud.

    IdempotencyKeyHeader:
      in: header
      name: Idempotency-Key
      required: false
      schema:
        type: string
      description: Unique key to safely retry create/resize/delete operations.

    LakeIdPath:
      in: path
      name: lakeId
      required: true
      schema:
        type: string

    OperationIdPath:
      in: path
      name: operationId
      required: true
      schema:
        type: string

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ProvisionLakeRequest:
      type: object
      required: [userId, sizeGiB]
      properties:
        userId:
          type: string
          example: user-123
        sizeGiB:
          type: integer
          format: int64
          minimum: 1
          example: 100

    ResizeLakeRequest:
      type: object
      required: [sizeGiB]
      properties:
        sizeGiB:
          type: integer
          format: int64
          minimum: 1
          example: 250

    Lake:
      type: object
      properties:
        lakeId:
          type: string
        tenantId:
          type: string
        userId:
          type: string
        requestedSizeGiB:
          type: integer
          format: int64
        status:
          type: string
          enum: [provisioning, ready, resizing, deleting, failed, deleted]
        rgwUser:
          type: string
        lastError:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Operation:
      type: object
      properties:
        operationId:
          type: string
        operationType:
          type: string
          enum: [provision, resize, deprovision]
        lakeId:
          type: string
        tenantId:
          type: string
        status:
          type: string
          enum: [pending, running, success, failed]
        errorMessage:
          type: string
        startedAt:
          type: string
          format: date-time
        endedAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
