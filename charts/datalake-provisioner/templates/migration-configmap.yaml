apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "datalake-provisioner.fullname" . }}-migrations
  labels:
    {{- include "datalake-provisioner.labels" . | nindent 4 }}
data:
  0001_init.up.sql: |
    CREATE TABLE IF NOT EXISTS lakes (
        lake_id              UUID PRIMARY KEY,
        tenant_id            TEXT NOT NULL,
        user_id              TEXT NOT NULL,
        requested_size_gib   BIGINT NOT NULL CHECK (requested_size_gib > 0),
        status               TEXT NOT NULL CHECK (status IN ('provisioning','ready','resizing','deleting','failed','deleted')),
        url                  TEXT,
        rgw_user             TEXT,
        bucket_name          TEXT,
        last_error           TEXT,
        created_at           TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at           TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    CREATE TABLE IF NOT EXISTS operations (
        operation_id         UUID PRIMARY KEY,
        operation_type       TEXT NOT NULL CHECK (operation_type IN ('provision','resize','deprovision')),
        lake_id              UUID REFERENCES lakes(lake_id) ON DELETE SET NULL,
        tenant_id            TEXT NOT NULL,
        status               TEXT NOT NULL CHECK (status IN ('pending','running','success','failed')),
        error_message        TEXT,
        started_at           TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        ended_at             TIMESTAMPTZ
    );

    CREATE TABLE IF NOT EXISTS idempotency_keys (
        tenant_id            TEXT NOT NULL,
        idempotency_key      TEXT NOT NULL,
        operation_id         UUID NOT NULL REFERENCES operations(operation_id) ON DELETE CASCADE,
        created_at           TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        PRIMARY KEY (tenant_id, idempotency_key)
    );

    CREATE INDEX IF NOT EXISTS idx_lakes_tenant_id ON lakes(tenant_id);
    CREATE INDEX IF NOT EXISTS idx_lakes_status ON lakes(status);
    CREATE INDEX IF NOT EXISTS idx_operations_tenant_id ON operations(tenant_id);
    CREATE INDEX IF NOT EXISTS idx_operations_lake_id ON operations(lake_id);
    CREATE INDEX IF NOT EXISTS idx_operations_status ON operations(status);

  0002_operations_runner.up.sql: |
    ALTER TABLE operations
        ADD COLUMN IF NOT EXISTS request_payload JSONB,
        ADD COLUMN IF NOT EXISTS attempt_count INTEGER NOT NULL DEFAULT 0 CHECK (attempt_count >= 0),
        ADD COLUMN IF NOT EXISTS next_attempt_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        ADD COLUMN IF NOT EXISTS updated_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        ADD COLUMN IF NOT EXISTS error_code TEXT;

    CREATE INDEX IF NOT EXISTS idx_operations_pending_runnable
        ON operations (status, next_attempt_at)
        WHERE status = 'pending';

    CREATE INDEX IF NOT EXISTS idx_operations_running_updated_at
        ON operations (status, updated_at)
        WHERE status = 'running';

  0003_idempotency_request_hash.up.sql: |
    ALTER TABLE idempotency_keys
        ADD COLUMN IF NOT EXISTS operation_type TEXT,
        ADD COLUMN IF NOT EXISTS request_hash TEXT;

    CREATE INDEX IF NOT EXISTS idx_idempotency_operation_id
        ON idempotency_keys (operation_id);

  0004_operation_state_guards.up.sql: |
    CREATE UNIQUE INDEX IF NOT EXISTS uq_operations_active_lake
        ON operations (tenant_id, lake_id)
        WHERE lake_id IS NOT NULL AND status IN ('pending', 'running');
