apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "datalake-provisioner.fullname" . }}-migrate
  labels:
    {{- include "datalake-provisioner.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "datalake-provisioner.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: {{ .Values.postgres.image }}
          imagePullPolicy: IfNotPresent
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "datalake-provisioner.fullname" . }}-postgres
                  key: POSTGRES_PASSWORD
          command:
            - sh
            - -c
            - |
              until pg_isready -h {{ include "datalake-provisioner.fullname" . }}-postgres -U {{ .Values.postgres.user }} -d {{ .Values.postgres.db }}; do
                echo "waiting for postgres..."
                sleep 2
              done
              for f in /migrations/*.up.sql; do
                echo "applying $f"
                psql -h {{ include "datalake-provisioner.fullname" . }}-postgres \
                  -U {{ .Values.postgres.user }} \
                  -d {{ .Values.postgres.db }} \
                  -v ON_ERROR_STOP=1 \
                  -f "$f"
              done
          volumeMounts:
            - name: migrations
              mountPath: /migrations
      volumes:
        - name: migrations
          configMap:
            name: {{ include "datalake-provisioner.fullname" . }}-migrations
