apiVersion: v1
kind: Secret
metadata:
  name: {{ include "datalake-provisioner.fullname" . }}-postgres
  labels:
    {{- include "datalake-provisioner.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_DB: {{ .Values.postgres.db | quote }}
  POSTGRES_USER: {{ .Values.postgres.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
