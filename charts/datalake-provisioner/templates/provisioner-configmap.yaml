apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "datalake-provisioner.fullname" . }}-config
  labels:
    {{- include "datalake-provisioner.labels" . | nindent 4 }}
data:
  HTTP_PORT: {{ .Values.provisioner.httpPort | quote }}
  READ_HEADER_TIMEOUT_SECONDS: {{ .Values.provisioner.readHeaderTimeoutSeconds | quote }}
  READY_TIMEOUT_SECONDS: {{ .Values.provisioner.readyTimeoutSeconds | quote }}
  LOG_FORMAT: {{ .Values.provisioner.logFormat | quote }}
  LOG_LEVEL: {{ .Values.provisioner.logLevel | quote }}
  OTEL_ENABLED: {{ .Values.provisioner.otelEnabled | quote }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.provisioner.otelExporterOtlpEndpoint | quote }}
  OTEL_EXPORTER_OTLP_INSECURE: {{ .Values.provisioner.otelExporterOtlpInsecure | quote }}
  WORKER_ENABLED: {{ .Values.provisioner.workerEnabled | quote }}
  WORKER_POLL_INTERVAL_SECONDS: {{ .Values.provisioner.workerPollIntervalSeconds | quote }}
  WORKER_STALE_AFTER_SECONDS: {{ .Values.provisioner.workerStaleAfterSeconds | quote }}
  WORKER_MAX_ATTEMPTS: {{ .Values.provisioner.workerMaxAttempts | quote }}

  RGW_ENDPOINT: {{ .Values.provisioner.rgwEndpoint | quote }}
  RGW_ADMIN_PATH: {{ .Values.provisioner.rgwAdminPath | quote }}
  RGW_REGION: {{ .Values.provisioner.rgwRegion | quote }}
  RGW_INSECURE_SKIP_VERIFY: {{ .Values.provisioner.rgwInsecureSkipVerify | quote }}
