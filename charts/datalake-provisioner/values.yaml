replicaCount: 1

image:
  repository: dev3at/datalake-provisioner
  tag: "0.1.1"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8081

ingress:
  enabled: false
  className: traefik
  annotations: {}
  hosts:
    - host: datalake-provisioner.lks.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

nodeSelector: {}
tolerations: []
affinity: {}

securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false

provisioner:
  httpPort: "8081"
  readHeaderTimeoutSeconds: "5"

  internalToken: "change-me"

  rgwEndpoint: "http://192.168.3.251:7480"
  rgwAdminPath: "/admin"
  rgwRegion: "us-east-1"
  rgwInsecureSkipVerify: "false"
  rgwAccessKeyId: "replace-me"
  rgwSecretAccessKey: "replace-me"

postgres:
  image: "postgres:16-alpine"
  db: "datalake"
  user: "postgres"
  password: "postgres"
  pgdata: "/var/lib/postgresql/data/pgdata"
  storageSize: "10Gi"
  storageClassName: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
