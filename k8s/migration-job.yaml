apiVersion: batch/v1
kind: Job
metadata:
  name: datalake-migrate-0001
  namespace: datalake
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          command:
            - sh
            - -c
            - |
              psql -h postgres -U postgres -d datalake -v ON_ERROR_STOP=1 -f /migrations/0001_init.up.sql
          volumeMounts:
            - name: migrations
              mountPath: /migrations
      volumes:
        - name: migrations
          configMap:
            name: datalake-migrations
